services:
  - type: web
    name: portal-api
    env: node
    region: tokyo
    plan: free
    buildCommand: cd app/backend && npm install
    startCommand: cd app/backend && npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SAFETY_PATROL_URL
        value: https://safety-patrol-app.vercel.app
      - key: NODE_ENV
        value: production
